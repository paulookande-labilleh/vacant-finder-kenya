<!DOCTYPE html>
<html>
<head>
  <title>Post Property</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>

<h1>➕ Post Property</h1>

<form id="propertyForm">

  <p>Property Type</p>
  <input type="text" id="type" required>

  <p>Location</p>
  <input type="text" id="location" required>

  <p>Rent (KSh)</p>
  <input type="number" id="rent" required>

  <p>Phone (2547... format)</p>
  <input type="text" id="phone" required>

  <p>Image</p>
  <input type="file" id="image" accept="image/*" required>

  <br><br>

  <button type="submit">Submit</button>

</form>

<p id="msg"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "vacant-finder-kenya.firebaseapp.com",
  projectId: "vacant-finder-kenya",
  storageBucket: "vacant-finder-kenya.firebasestorage.app",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

const form = document.getElementById("propertyForm");
const msg = document.getElementById("msg");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  try {
    const file = document.getElementById("image").files[0];

    const storageRef = ref(storage, "properties/" + file.name);
    await uploadBytes(storageRef, file);

    const imageURL = await getDownloadURL(storageRef);

    await addDoc(collection(db, "properties"), {
      type: document.getElementById("type").value,
      location: document.getElementById("location").value,
      rent: document.getElementById("rent").value,
      phone: document.getElementById("phone").value,
      image: imageURL,
      status: "pending"
    });

    msg.innerText = "✅ Submitted for approval";
    form.reset();

  } catch (err) {
    console.log(err);
    msg.innerText = "❌ Error uploading";
  }
});
</script>

</body>
</html>
