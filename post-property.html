<!DOCTYPE html>
<html>
<head>
  <title>Post Property</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{
      font-family:Arial;
      margin:0;
      background:linear-gradient(135deg,#1b5e20,#43a047);
      color:white;
    }

    .container{
      max-width:500px;
      margin:auto;
      background:white;
      color:black;
      padding:20px;
      margin-top:30px;
      border-radius:15px;
    }

    h1{
      text-align:center;
      color:#1b5e20;
    }

    input{
      width:100%;
      padding:12px;
      margin:8px 0;
      border:1px solid #ccc;
      border-radius:10px;
    }

    button{
      width:100%;
      padding:14px;
      background:#1b5e20;
      color:white;
      border:none;
      border-radius:10px;
      font-size:16px;
      margin-top:10px;
    }

    button:hover{
      background:#145a1a;
    }

    .msg{
      text-align:center;
      margin-top:10px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>➕ Post Property</h1>

  <form id="propertyForm">

    <input type="text" id="type" placeholder="Property Type" required>
    <input type="text" id="location" placeholder="Location" required>
    <input type="number" id="rent" placeholder="Rent (KSh)" required>
    <input type="text" id="phone" placeholder="Phone (2547...)" required>
    <input type="file" id="image" required>

    <button type="submit">Submit Listing</button>
  </form>

  <p class="msg" id="msg"></p>
</div>

</body>
</html>
