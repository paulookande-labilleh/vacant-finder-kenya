<!DOCTYPE html>
<html>
<head>
  <title>Unlock Access</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{
      font-family:Arial;
      background:linear-gradient(135deg,#1b5e20,#43a047);
      margin:0;
      color:white;
      text-align:center;
      padding:20px;
    }

    .box{
      background:white;
      color:black;
      max-width:400px;
      margin:auto;
      padding:20px;
      border-radius:15px;
    }

    input{
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:10px;
      border:1px solid #ccc;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:10px;
      background:#1b5e20;
      color:white;
      border:none;
      border-radius:10px;
      font-weight:bold;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>💰 Unlock Listings</h2>
  <p>Pay KSh 350 via M-Pesa</p>

  <input id="code" placeholder="Enter M-Pesa code">
  <button onclick="unlock()">Verify</button>

  <p id="msg"></p>
</div>

</body>
</html>
