<!DOCTYPE html>
<html>

<body>

<h2>💰 Unlock Listings - KSh 350</h2>

<p>Pay via M-Pesa:</p>

<p><b>Paybill:</b> YOUR_PAYBILL</p>
<p><b>Account:</b> VacantFinder</p>

<p>After payment enter code:</p>

<input id="code" placeholder="M-Pesa code">

}
</script>
