<!DOCTYPE html>
<html>
<head>
  <title>Vacant Finder Kenya</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#f4f6f8;
    }

    /* HERO HEADER */
    .hero{
      background:linear-gradient(135deg,#1b5e20,#43a047);
      color:white;
      padding:25px 15px;
      text-align:center;
    }

    .hero h1{
      margin:0;
      font-size:24px;
    }

    .hero p{
      margin:5px 0 0;
      font-size:14px;
      opacity:0.9;
    }

    /* FILTER BOX */
    .filters{
      background:white;
      margin:-20px 10px 10px;
      padding:15px;
      border-radius:15px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);

      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    select, button{
      padding:12px;
      border-radius:10px;
      border:1px solid #ddd;
      font-size:14px;
    }

    button{
      background:#1b5e20;
      color:white;
      font-weight:bold;
      border:none;
    }

    /* GRID */
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:15px;
      padding:15px;
    }

    /* CARD */
    .card{
      background:white;
      border-radius:15px;
      overflow:hidden;
      box-shadow:0 5px 15px rgba(0,0,0,0.08);
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
      box-shadow:0 10px 20px rgba(0,0,0,0.15);
    }

    .card img{
      width:100%;
      height:180px;
      object-fit:cover;
    }

    .content{
      padding:12px;
    }

    .title{
      font-size:16px;
      font-weight:bold;
      margin-bottom:5px;
    }

    .location{
      font-size:13px;
      color:#555;
    }

    .price{
      margin-top:8px;
      font-size:16px;
      font-weight:bold;
      color:#1b5e20;
    }

    .badge{
      display:inline-block;
      padding:4px 8px;
      font-size:12px;
      background:#e8f5e9;
      color:#1b5e20;
      border-radius:20px;
      margin-top:6px;
    }

    /* BUTTONS */
    .unlock{
      width:100%;
      padding:10px;
      margin-top:10px;
      background:#ff9800;
      color:white;
      border:none;
      border-radius:10px;
      font-weight:bold;
    }

    .contact{
      display:none;
      margin-top:10px;
    }

    .contact button{
      width:100%;
      margin-top:5px;
      padding:10px;
      border:none;
      border-radius:10px;
      font-weight:bold;
    }

    .whatsapp{
      background:#25D366;
      color:white;
    }

    .call{
      background:#1b5e20;
      color:white;
    }

    /* MOBILE */
    @media(max-width:500px){
      .filters{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>

<body>

<div class="hero">
  <h1>🏠 Vacant Finder Kenya</h1>
  <p>Find rooms, bedsitters & houses near you</p>
</div>

<!-- FILTERS -->
<div class="filters">

  <select id="location">
    <option value="">Location</option>
    <option>Lurambi CBD</option>
    <option>Lurambi Clutch</option>
    <option>Lurambi Roundabout</option>
    <option>Lurambi Mwiyala</option>
    <option>Koro Matangi</option>
    <option>Sichirayi</option>
    <option>Kefinco</option>
    <option>Town</option>
    <option>Milimani</option>
    <option>Teazone</option>
    <option>Hostels</option>
    <option>Maraba</option>
  </select>

  <select id="type">
    <option value="">Type</option>
    <option>Single Room</option>
    <option>Double Room</option>
    <option>Bedsitter</option>
    <option>Hostel</option>
    <option>1 Bedroom</option>
    <option>2 Bedroom</option>
    <option>Family Home</option>
    <option>Land For Sale</option>
  </select>

  <select id="rentRange">
    <option value="">Rent Range</option>
    <option value="1000-2500">1000 - 2500</option>
    <option value="2500-4500">2500 - 4500</option>
    <option value="4500-6500">4500 - 6500</option>
    <option value="6500-10000">6500 - 10000</option>
    <option value="10000-15000">10000 - 15000</option>
  </select>

  <button onclick="filterData()">Search</button>

</div>

<!-- LISTINGS -->
<div class="grid" id="listings">Loading...</div>

<script>
let allData = [];

function render(data){
  const box = document.getElementById("listings");
  box.innerHTML = "";

  data.forEach((p,i)=>{
    box.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <div class="content">

          <div class="title">${p.type}</div>
          <div class="location">📍 ${p.location}</div>

          <div class="price">KSh ${p.rent}</div>

          <div class="badge">${p.type}</div>

          <button class="unlock" onclick="unlock(${i})">
            🔒 Unlock Contact - KSh 350
          </button>

          <div class="contact" id="c${i}">
            <button class="whatsapp" onclick="window.open('https://wa.me/${p.phone}')">
              💬 WhatsApp
            </button>
            <button class="call" onclick="window.open('tel:${p.phone}')">
              📞 Call
            </button>
          </div>

        </div>
      </div>
    `;
  });
}

function filterData(){

  const loc = document.getElementById("location").value.toLowerCase();
  const type = document.getElementById("type").value.toLowerCase();
  const range = document.getElementById("rentRange").value;

  const filtered = allData.filter(p=>{
    const price = parseInt(p.rent);

    let ok = true;

    if(range === "1000-2500") ok = price>=1000 && price<=2500;
    if(range === "2500-4500") ok = price>2500 && price<=4500;
    if(range === "4500-6500") ok = price>4500 && price<=6500;
    if(range === "6500-10000") ok = price>6500 && price<=10000;
    if(range === "10000-15000") ok = price>10000 && price<=15000;

    return (
      (loc==="" || p.location.toLowerCase().includes(loc)) &&
      (type==="" || p.type.toLowerCase().includes(type)) &&
      ok
    );
  });

  render(filtered);
}

function unlock(i){
  if(localStorage.getItem("paid")==="true"){
    document.getElementById("c"+i).style.display="block";
  } else {
    alert("🔒 Pay KSh 350 to unlock contact");
    window.location.href="payment.html";
  }
}

/* TEMP SAMPLE (REMOVE WHEN FIREBASE CONNECTED) */
allData = [];
render(allData);

</script>

</body>
</html>
