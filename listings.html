<!DOCTYPE html>
<html>
<head>
  <title>Vacant Finder Kenya</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body{
      font-family:Arial;
      margin:0;
      background:#f4f6f8;
    }

    .header{
      background:linear-gradient(135deg,#1b5e20,#43a047);
      color:white;
      padding:20px;
      text-align:center;
      font-size:22px;
      font-weight:bold;
    }

    .filters{
      background:white;
      padding:10px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    select, button{
      padding:12px;
      border-radius:10px;
      border:1px solid #ccc;
    }

    button{
      background:#1b5e20;
      color:white;
      font-weight:bold;
      border:none;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:15px;
      padding:15px;
    }

    .card{
      background:white;
      border-radius:15px;
      overflow:hidden;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    .card img{
      width:100%;
      height:180px;
      object-fit:cover;
    }

    .content{
      padding:12px;
    }

    .price{
      color:#1b5e20;
      font-weight:bold;
    }

    .unlock{
      width:100%;
      padding:10px;
      background:#ff9800;
      color:white;
      border:none;
      border-radius:8px;
      font-weight:bold;
      margin-top:8px;
    }

    .contact{
      display:none;
      margin-top:10px;
    }

    .contact button{
      width:100%;
      padding:10px;
      margin-top:5px;
      border:none;
      border-radius:8px;
      font-weight:bold;
    }

    .whatsapp{
      background:#25D366;
      color:white;
    }

    .call{
      background:#1b5e20;
      color:white;
    }
  </style>
</head>

<body>

<div class="header">🏠 Vacant Finder Kenya</div>

<!-- FILTERS -->
<div class="filters">

  <!-- LOCATION -->
  <select id="location">
    <option value="">Select Location</option>
    <option>Lurambi CBD</option>
    <option>Lurambi Clutch</option>
    <option>Lurambi Roundabout</option>
    <option>Lurambi Mwiyala</option>
    <option>Koro Matangi</option>
    <option>Sichirayi</option>
    <option>Kefinco</option>
    <option>Town</option>
    <option>Milimani</option>
    <option>Teazone</option>
    <option>Hostels</option>
    <option>Maraba</option>
  </select>

  <!-- ROOM TYPE -->
  <select id="type">
    <option value="">Room Type</option>
    <option>Single Room</option>
    <option>Double Room</option>
    <option>Bedsitter</option>
    <option>Hostel</option>
    <option>1 Bedroom</option>
    <option>2 Bedroom</option>
    <option>Family Home</option>
    <option>Land For Sale</option>
  </select>

  <button onclick="filterData()">Search</button>

</div>

<!-- LISTINGS -->
<div class="grid" id="listings">Loading...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "vacant-finder-kenya.firebaseapp.com",
  projectId: "vacant-finder-kenya"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allData = [];
const container = document.getElementById("listings");

async function load(){
  const snap = await getDocs(collection(db,"properties"));

  allData = [];
  snap.forEach(doc=>{
    allData.push(doc.data());
  });

  render(allData);
}

window.filterData = function(){
  const loc = document.getElementById("location").value.toLowerCase();
  const type = document.getElementById("type").value.toLowerCase();

  const filtered = allData.filter(p=>{
    return (
      (loc === "" || p.location.toLowerCase().includes(loc)) &&
      (type === "" || p.type.toLowerCase().includes(type))
    );
  });

  render(filtered);
}

function render(data){
  container.innerHTML = "";

  data.forEach((p,i)=>{
    container.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <div class="content">
          <h3>${p.type}</h3>
          <p>📍 ${p.location}</p>
          <p class="price">KSh ${p.rent}</p>

          <button class="unlock" onclick="unlock(${i})">
            🔒 Pay KSh 350 to unlock contact
          </button>

          <div class="contact" id="c${i}">
            <button class="whatsapp" onclick="window.open('https://wa.me/${p.phone}')">
              💬 WhatsApp
            </button>
            <button class="call" onclick="window.open('tel:${p.phone}')">
              📞 Call
            </button>
          </div>

        </div>
      </div>
    `;
  });
}

window.unlock = function(i){
  if(localStorage.getItem("paid") === "true"){
    document.getElementById("c"+i).style.display="block";
  } else {
    alert("🔒 Pay KSh 350 to unlock contacts");
    window.location.href="payment.html";
  }
}

load();
</script>

</body>
</html>
