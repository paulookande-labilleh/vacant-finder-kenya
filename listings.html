<!DOCTYPE html>
<html>
<head>
  <title>Property Listings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{
      font-family: Arial;
      background:#f5f5f5;
      padding:10px;
    }

    .card{
      background:white;
      padding:15px;
      margin-bottom:10px;
      border-radius:10px;
      box-shadow:0 2px 5px rgba(0,0,0,0.15);
    }

    button{
      padding:10px;
      width:100%;
      background:#1b5e20;
      color:white;
      border:none;
      border-radius:8px;
    }
  </style>
</head>

<body>

<h1>🏠 Available Properties</h1>

<div id="listings">Loading...</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { getFirestore, collection, getDocs }
  from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDgETwOznaxDJN98DljftV18AOMAYQZ-QE",
    authDomain: "vacant-finder-kenya.firebaseapp.com",
    projectId: "vacant-finder-kenya",
    storageBucket: "vacant-finder-kenya.firebasestorage.app",
    messagingSenderId: "797542745576",
    appId: "1:797542745576:web:e581d296dfeb52772bd05d"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const listingsDiv = document.getElementById("listings");

  async function loadListings() {
    const querySnapshot = await getDocs(collection(db, "properties"));

    listingsDiv.innerHTML = "";

    querySnapshot.forEach((doc) => {
      const data = doc.data();

      listingsDiv.innerHTML += `
        <div class="card">
          <h3>${data.type}</h3>
          <p>📍 Location: ${data.location}</p>
          <p>💰 Rent: KSh ${data.rent}</p>
          <button onclick="window.open('https://wa.me/${data.phone}')">
            Contact Landlord
          </button>
        </div>
      `;
    });
  }

  loadListings();
</script>

</body>
</html>
