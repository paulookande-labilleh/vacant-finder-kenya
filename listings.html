<!DOCTYPE html>
<html>
<head>
  <title>Listings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{
      font-family:Arial;
      margin:0;
      background:#f4f6f8;
    }

    .header{
      background:linear-gradient(135deg,#1b5e20,#43a047);
      color:white;
      padding:20px;
      text-align:center;
      font-size:22px;
      font-weight:bold;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:15px;
      padding:15px;
    }

    .card{
      background:white;
      border-radius:15px;
      overflow:hidden;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
      transition:0.3s;
    }

    .card:hover{
      transform:scale(1.03);
    }

    .card img{
      width:100%;
      height:180px;
      object-fit:cover;
    }

    .content{
      padding:12px;
    }

    .price{
      color:#1b5e20;
      font-weight:bold;
    }

    button{
      width:100%;
      padding:12px;
      background:#25D366;
      color:white;
      border:none;
      font-weight:bold;
      border-radius:8px;
      margin-top:8px;
    }
  </style>
</head>

<body>

<div class="header">🏠 Available Properties</div>

<div class="grid" id="listings">Loading...</div>

</body>
</html>
