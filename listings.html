<!DOCTYPE html>
<html>
<head>
  <title>Listings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{font-family:Arial;background:#f5f5f5;padding:10px;}
    .card{background:white;margin-bottom:10px;border-radius:10px;overflow:hidden;}
    img{width:100%;height:200px;object-fit:cover;}
    .c{padding:10px;}
    button{width:100%;padding:10px;background:green;color:white;border:none;}
  </style>
</head>
<body>

<h1>🏠 Approved Listings</h1>
<div id="listings">Loading...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "vacant-finder-kenya.firebaseapp.com",
  projectId: "vacant-finder-kenya"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const q = query(collection(db,"properties"), where("status","==","approved"));

const container = document.getElementById("listings");

async function load(){
  const snap = await getDocs(q);
  container.innerHTML = "";

  snap.forEach(doc=>{
    const d = doc.data();

    container.innerHTML += `
      <div class="card">
        <img src="${d.image}">
        <div class="c">
          <h3>${d.type}</h3>
          <p>${d.location}</p>
          <p>KSh ${d.rent}</p>
          <button onclick="window.open('https://wa.me/${d.phone}')">
            Contact
          </button>
        </div>
      </div>
    `;
  });
}

load();
</script>

</body>
</html>
