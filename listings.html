<script>
  if (localStorage.getItem("paid") !== "true") {
    alert("🔒 Pay KSh 350 to access listings");
    window.location.href = "index.html";
  }
</script>
<!DOCTYPE html>
<html>
<head>
  <title>Property Listings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{
      font-family: Arial;
      background:#f5f5f5;
      padding:10px;
    }

    .card{
      background:white;
      margin-bottom:10px;
      border-radius:10px;
      overflow:hidden;
      box-shadow:0 2px 5px rgba(0,0,0,0.15);
    }

    .card img{
      width:100%;
      height:200px;
      object-fit:cover;
    }

    .content{
      padding:10px;
    }

    button{
      padding:10px;
      width:100%;
      background:#1b5e20;
      color:white;
      border:none;
    }
  </style>
</head>

<body>

<h1>🏠 Available Properties</h1>

<div id="listings">Loading...</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { getFirestore, collection, getDocs }
  from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDgETwOznaxDJN98DljftV18AOMAYQZ-QE",
    authDomain: "vacant-finder-kenya.firebaseapp.com",
    projectId: "vacant-finder-kenya",
    storageBucket: "vacant-finder-kenya.firebasestorage.app",
    messagingSenderId: "797542745576",
    appId: "1:797542745576:web:e581d296dfeb52772bd05d"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const listingsDiv = document.getElementById("listings");

  async function loadListings() {
    const querySnapshot = await getDocs(collection(db, "properties"));

    listingsDiv.innerHTML = "";

    querySnapshot.forEach((doc) => {
      const data = doc.data();

      listingsDiv.innerHTML += `
        <div class="card">
          <img src="${data.image}" />
          <div class="content">
            <h3>${data.type}</h3>
            <p>📍 ${data.location}</p>
            <p>💰 KSh ${data.rent}</p>
            <button onclick="window.open('https://wa.me/${data.phone}')">
              Contact Landlord
            </button>
          </div>
        </div>
      `;
    });
  }

  loadListings();
</script>

</body>
</html>
