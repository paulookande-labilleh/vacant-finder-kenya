<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{
      font-family:Arial;
      background:#0f172a;
      color:white;
      margin:0;
    }

    .header{
      background:#1b5e20;
      padding:20px;
      text-align:center;
      font-size:20px;
    }

    .card{
      background:#1e293b;
      margin:10px;
      padding:15px;
      border-radius:12px;
    }

    button{
      width:48%;
      padding:10px;
      border:none;
      border-radius:8px;
      margin-top:8px;
      font-weight:bold;
      cursor:pointer;
    }

    .approve{
      background:#22c55e;
      color:white;
    }

    .reject{
      background:#ef4444;
      color:white;
    }
  </style>
</head>

<body>

<div class="header">🔐 Admin Dashboard</div>

<div id="list"></div>

</body>
</html>
